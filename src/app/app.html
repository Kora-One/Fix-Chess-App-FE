<div class="analyzer-container">
  <h2>FixChess AI Analyzer</h2>
  
  <input type="text" [(ngModel)]="username" placeholder="Enter Chess.com Username" [disabled]="loading" />

  @if (!loading) {
    <div class="mood-board">
      <button class="btn btn-roast" [class.active]="selectedMood === 'roast'" (click)="selectMood('roast')">🔥 Roast</button>
      <button class="btn btn-humor" [class.active]="selectedMood === 'humor'" (click)="selectMood('humor')">😂 Humor</button>
      <button class="btn btn-sad" [class.active]="selectedMood === 'sad'" (click)="selectMood('sad')">🎻 Dramatic</button>
      <button class="btn btn-straight" [class.active]="selectedMood === 'straight'" (click)="selectMood('straight')">♟️ Straight</button>
    </div>
  }

  @if (showMoodError) {
    <p class="error-text">⚠️ Please choose a mood before analyzing!</p>
  }

  @if (!loading) {
    <button class="btn-analyze" (click)="getAnalysis()">
      Analyze Game
    </button>
  }

  @if (loading) {
    <div class="loader-container">
      <p>Analyzing games... {{ progressPercentage | number:'1.0-0' }}%</p>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" [style.width.%]="progressPercentage"></div>
      </div>
    </div>
  }

  @if (report && !loading) {
    <div class="result-box">
      <div class="markdown-output" [innerHTML]="report"></div>
    </div>
  }
</div>
